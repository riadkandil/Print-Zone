<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Print Zone — مركز الطباعة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#eef1f6; --surface:#ffffff; --surface-2:#f6f8fb; --surface-3:#edf0f5;
  --border:#cdd5e0; --border-light:#dce3ed;
  --primary:#1d4ed8; --primary-light:#dbeafe; --primary-50:#eff6ff; --primary-hover:#1e40af; --primary-text:#1e3a8a;
  --green:#15803d; --green-light:#dcfce7; --green-50:#f0fdf4;
  --red:#b91c1c; --red-light:#fee2e2; --red-50:#fef2f2;
  --orange:#c2410c; --orange-light:#ffedd5;
  --purple:#6d28d9; --purple-light:#ede9fe;
  --teal:#0f766e; --teal-light:#ccfbf1;
  --amber:#b45309; --amber-light:#fef3c7;
  --text:#0c1425; --text-2:#1e293b; --text-muted:#475569; --text-dim:#64748b;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow:0 1px 4px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.05);
  --shadow-md:0 4px 10px rgba(0,0,0,.1);
  --shadow-lg:0 10px 20px rgba(0,0,0,.1);
  --nav-bg:rgba(255,255,255,.97); --nav-shadow:0 -4px 20px rgba(0,0,0,.06);
  --chip-sky:#e0f2fe; --chip-sky-color:#0369a1;
  --topbar-bg:rgba(248,250,252,.92); --topbar-border:#e2e8f0;
  --overlay-bg:rgba(0,0,0,.45);
  --radius:14px; --radius-sm:10px; --nav-h:64px; --topbar-h:52px;
}
html.dark {
  --bg:#0f1219; --surface:#181d27; --surface-2:#1e2433; --surface-3:#252d3d;
  --border:#2e384a; --border-light:#334155;
  --primary:#3b82f6; --primary-light:rgba(59,130,246,.15); --primary-50:rgba(59,130,246,.08); --primary-hover:#2563eb; --primary-text:#93c5fd;
  --green:#22c55e; --green-light:rgba(34,197,94,.15); --green-50:rgba(34,197,94,.08);
  --red:#ef4444; --red-light:rgba(239,68,68,.15); --red-50:rgba(239,68,68,.08);
  --orange:#f97316; --orange-light:rgba(249,115,22,.15);
  --purple:#a78bfa; --purple-light:rgba(167,139,250,.15);
  --teal:#2dd4bf; --teal-light:rgba(45,212,191,.12);
  --amber:#fbbf24; --amber-light:rgba(251,191,36,.15);
  --text:#e2e8f0; --text-2:#cbd5e1; --text-muted:#94a3b8; --text-dim:#64748b;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3); --shadow:0 1px 4px rgba(0,0,0,.4);
  --shadow-md:0 4px 10px rgba(0,0,0,.4); --shadow-lg:0 10px 20px rgba(0,0,0,.5);
  --nav-bg:rgba(15,18,25,.97); --nav-shadow:0 -4px 20px rgba(0,0,0,.3);
  --chip-sky:rgba(56,189,248,.12); --chip-sky-color:#38bdf8;
  --topbar-bg:rgba(26,32,48,.92); --topbar-border:#2e384a;
  --overlay-bg:rgba(0,0,0,.65);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;color:var(--text)}
input,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:.9rem;font-weight:600;outline:none;transition:border .15s, box-shadow .15s}
input:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
textarea{resize:vertical;min-height:54px}
label{display:block;font-size:.74rem;font-weight:700;color:var(--text-muted);margin-bottom:4px}
::placeholder{color:var(--text-dim);font-weight:500}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(1200px 600px at 50% -10%, var(--primary-light), transparent), var(--bg)}
.login-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border-light);border-radius:22px;box-shadow:var(--shadow-lg);padding:28px 26px;position:relative}
.login-top-controls{position:absolute;top:14px;inset-inline-end:14px;display:flex;gap:8px}
.login-logo{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,var(--primary),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:2.1rem;margin:4px auto 12px;box-shadow:var(--shadow-md)}
.login-name{text-align:center;font-size:1.45rem;font-weight:900;letter-spacing:.3px}
.login-tag{text-align:center;font-size:.82rem;color:var(--text-muted);font-weight:600;margin-bottom:20px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
.role-card{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface-2);padding:16px 12px;text-align:center;transition:all .15s;cursor:pointer}
.role-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.role-card.selected{border-color:var(--primary);background:var(--primary-50);box-shadow:0 0 0 3px var(--primary-light)}
.role-icon{font-size:1.7rem;margin-bottom:6px}
.role-name{font-weight:800;font-size:.98rem}
.role-sub{font-size:.7rem;color:var(--text-muted);font-weight:600;line-height:1.4}
.login-pw-area{margin-top:14px;display:none}
.login-pw-area.visible{display:block;animation:fadeUp .2s}
.login-error{color:var(--red);font-size:.78rem;font-weight:700;min-height:20px;text-align:center;margin-top:8px}
.btn-login{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:1rem;font-weight:800;margin-top:2px;transition:background .15s}
.btn-login:hover{background:var(--primary-hover)}
.login-mode-note{margin-top:14px;text-align:center;font-size:.72rem;font-weight:700;border-radius:var(--radius-sm);padding:8px 10px}
.mode-local{background:var(--amber-light);color:var(--amber)}
.mode-online{background:var(--green-light);color:var(--green)}
.mode-err{background:var(--red-light);color:var(--red);text-align:start;line-height:1.7}
.login-ver{text-align:center;font-size:.64rem;color:var(--text-dim);font-weight:700;margin-top:10px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== ICON BUTTONS ===== */
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text);font-weight:800}
.icon-btn:hover{border-color:var(--primary);color:var(--primary)}
.icon-btn .icon-dark{display:none}
html.dark .icon-btn .icon-dark{display:inline}
html.dark .icon-btn .icon-light{display:none}
.lang-btn{width:auto;padding:0 10px;font-size:.78rem}

/* ===== APP SHELL ===== */
#appView{display:none}
#appView.active{display:block}
.topbar{position:sticky;top:0;z-index:50;height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);backdrop-filter:blur(10px)}
.topbar-brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:.95rem}
.topbar-logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:.95rem}
.topbar-controls{display:flex;align-items:center;gap:8px}
.conn-pill{display:flex;align-items:center;gap:6px;font-size:.68rem;font-weight:800;padding:4px 10px;border-radius:99px;background:var(--surface-2);border:1px solid var(--border-light);color:var(--text-muted)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim)}
.conn-pill.online .conn-dot{background:var(--green);box-shadow:0 0 0 3px var(--green-light)}
.conn-pill.offline .conn-dot{background:var(--red);box-shadow:0 0 0 3px var(--red-light)}
.conn-pill.local .conn-dot{background:var(--amber);box-shadow:0 0 0 3px var(--amber-light)}
.role-pill{font-size:.68rem;font-weight:800;padding:4px 10px;border-radius:99px;background:var(--purple-light);color:var(--purple)}
.main-content{max-width:880px;margin:0 auto;padding-bottom:calc(var(--nav-h) + 24px)}
.page{display:none}
.page.active{display:block;animation:fadeUp .18s}
.page-pad{padding:16px 14px}

/* ===== NAV ===== */
.nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:60;height:var(--nav-h);background:var(--nav-bg);border-top:1px solid var(--border-light);box-shadow:var(--nav-shadow);display:flex;justify-content:center;gap:4px;backdrop-filter:blur(10px)}
.nav-item{flex:1;max-width:150px;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text-dim);border-radius:12px;margin:6px 2px;transition:all .15s}
.nav-item .nav-icon{font-size:1.25rem}
.nav-item .nav-label{font-size:.66rem;font-weight:800}
.nav-item.active{color:var(--primary);background:var(--primary-50)}
.nav-item:hover{color:var(--primary)}

/* ===== CARDS / SECTIONS ===== */
.page-header-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:14px}
.page-title{font-size:1.12rem;font-weight:900;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.page-title .title-icon{font-size:1.2rem}
.form-row{display:flex;gap:10px;margin-top:10px}
.form-row .field{flex:1}
.section-label{display:flex;align-items:center;gap:7px;font-size:.8rem;font-weight:800;color:var(--text-2);margin:16px 2px 8px}
.section-label .dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}
.card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:0}
.card h3{font-size:.95rem;font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:7px}

/* ===== PRICE MODE ===== */
.price-mode-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:10px 14px;margin-top:14px;box-shadow:var(--shadow-sm)}
.price-mode-label{font-size:.82rem;font-weight:800}
.price-mode-options{display:flex;background:var(--surface-3);border-radius:10px;padding:3px;gap:3px}
.price-mode-btn{border:none;background:none;padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:800;color:var(--text-muted);transition:all .15s}
.price-mode-btn.active{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm)}

/* ===== SERVICE GRID ===== */
.service-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.svc-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 6px;text-align:center;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.svc-btn:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.svc-btn.selected{border-color:var(--primary);background:var(--primary-50);color:var(--primary-text);box-shadow:0 0 0 3px var(--primary-light)}
.svc-btn .svc-icon{font-size:1.3rem}
@media (max-width:560px){.svc-btn{font-size:.7rem;padding:10px 4px}}

/* ===== SUB PANEL / CHIPS ===== */
.sub-panel{display:none;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:14px;margin-top:12px;box-shadow:var(--shadow-sm)}
.sub-panel.visible{display:block;animation:fadeUp .18s}
.sub-panel .section-label{margin-top:4px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1.5px solid var(--border);border-radius:99px;background:var(--surface-2);padding:7px 16px;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .15s;color:var(--text-2)}
.chip:hover{border-color:var(--primary)}
.chip.sel{border-color:var(--primary);background:var(--primary-50);color:var(--primary-text);box-shadow:0 0 0 3px var(--primary-light)}
.chip.sel-orange{border-color:var(--orange);background:var(--orange-light);color:var(--orange);box-shadow:0 0 0 3px var(--orange-light)}
.chip.sel-green{border-color:var(--green);background:var(--green-light);color:var(--green);box-shadow:0 0 0 3px var(--green-light)}
.eng-fields{display:none;background:var(--teal-light);border:1px dashed var(--teal);border-radius:var(--radius-sm);padding:12px;margin-top:12px}
.eng-fields.visible{display:block}
.eng-title{font-size:.8rem;font-weight:900;color:var(--teal);margin-bottom:8px}
.eng-row{display:flex;gap:10px}
.eng-row .field{flex:1}
.add-row{display:grid;grid-template-columns:90px 1fr auto auto;gap:10px;align-items:end;margin-top:14px}
.mini-field label{font-size:.7rem}
.btn-add-item{border:none;border-radius:var(--radius-sm);background:var(--green);color:#fff;font-weight:800;font-size:.85rem;padding:10px 18px;transition:opacity .15s;height:40px;white-space:nowrap}
.btn-add-item:disabled{opacity:.4;cursor:not-allowed}
.btn-cancel-item{border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2);color:var(--text-muted);font-weight:800;font-size:.85rem;padding:10px 14px;height:40px;white-space:nowrap}
@media (max-width:560px){.add-row{grid-template-columns:1fr 1fr !important}}

/* ===== CUSTOM SERVICE ===== */
.custom-svc{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);margin-top:12px;overflow:hidden;cursor:pointer;transition:border .15s}
.custom-svc:hover{border-color:var(--primary)}
.custom-svc-header{padding:11px 16px;font-size:.83rem;font-weight:800;color:var(--text-muted)}
.custom-svc-body{display:none;padding:0 14px 14px}
.custom-svc.expanded{cursor:default;border-style:solid;border-color:var(--primary)}
.custom-svc.expanded .custom-svc-body{display:block}

/* ===== INVOICE ===== */
.invoice-mini{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);margin-top:16px;box-shadow:var(--shadow-sm);overflow:hidden}
.invoice-mini-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-light)}
.invoice-mini-head h3{font-size:.92rem;font-weight:900}
.btn-clear-inv{border:none;background:var(--red-light);color:var(--red);border-radius:8px;padding:5px 12px;font-size:.72rem;font-weight:800}
.invoice-mini-body{max-height:300px;overflow-y:auto}
.inv-empty{text-align:center;color:var(--text-dim);font-size:.8rem;font-weight:600;padding:22px}
.inv-item{padding:10px 14px;border-bottom:1px solid var(--border-light)}
.inv-item:last-child{border-bottom:none}
.inv-item-top{display:flex;align-items:center;gap:8px}
.inv-item-info{flex:1;display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:.66rem;font-weight:800;padding:3px 9px;border-radius:99px;background:var(--surface-3);color:var(--text-muted)}
.tag-paper{background:var(--primary-light);color:var(--primary-text)}
.tag-op{background:var(--chip-sky);color:var(--chip-sky-color)}
.tag-custom{background:var(--purple-light);color:var(--purple)}
.tag-color{background:var(--orange-light);color:var(--orange)}
.tag-black{background:var(--surface-3);color:var(--text-2)}
.tag-face{background:var(--teal-light);color:var(--teal)}
.tag-finish{background:var(--amber-light);color:var(--amber)}
.tag-final{background:var(--red-light);color:var(--red)}
.tag-eng{background:var(--teal-light);color:var(--teal)}
.inv-item-qty{font-size:.78rem;font-weight:800;color:var(--text-muted);white-space:nowrap}
.inv-item-total{font-size:.88rem;font-weight:900;color:var(--green);white-space:nowrap;direction:ltr}
.btn-del-item{border:none;background:var(--red-light);color:var(--red);width:26px;height:26px;border-radius:8px;font-size:.75rem;font-weight:900;flex-shrink:0}
.inv-item-eng{margin-top:5px;font-size:.74rem;font-weight:700;color:var(--teal);display:flex;gap:8px;flex-wrap:wrap}
.inv-total-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--green-50);border-top:1px solid var(--border-light)}
.inv-total-bar .lbl{font-size:.85rem;font-weight:800;color:var(--text-muted)}
.inv-total-bar .val{font-size:1.25rem;font-weight:900;color:var(--green)}
.btn-save-transaction{width:100%;margin-top:14px;padding:14px;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;font-size:1.02rem;font-weight:900;box-shadow:var(--shadow-md);transition:all .15s}
.btn-save-transaction:hover{background:var(--primary-hover)}
.btn-save-transaction:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

/* ===== HISTORY ===== */
.history-top{display:flex;gap:10px;margin-bottom:10px}
.search-box{flex:1}
.history-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{border:1.5px solid var(--border);border-radius:99px;background:var(--surface);padding:6px 16px;font-size:.76rem;font-weight:800;cursor:pointer;color:var(--text-muted);transition:all .15s}
.filter-chip.active{border-color:var(--primary);background:var(--primary);color:#fff}
.period-total-bar{display:none;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.period-total-bar.visible{display:flex}
.period-total-bar .lbl{font-size:.78rem;font-weight:800;color:var(--text-muted)}
.period-total-bar .val{font-size:1.05rem;font-weight:900;color:var(--green)}
.history-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:10px;position:relative}
.history-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.history-card-head .client{font-weight:900;font-size:.95rem}
.history-card-head .date{font-size:.72rem;font-weight:700;color:var(--text-dim)}
.history-card .notes{font-size:.78rem;color:var(--text-muted);font-weight:600;margin-bottom:6px}
.history-card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.history-card-bottom{display:flex;align-items:center;justify-content:space-between}
.items-count{font-size:.74rem;font-weight:700;color:var(--text-dim)}
.history-card .total{font-weight:900;color:var(--green);font-size:1rem}
.by-badge{font-size:.64rem;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--surface-3);color:var(--text-dim);margin-inline-start:6px}
.btn-delete-transaction{border:none;background:var(--red-light);color:var(--red);border-radius:8px;padding:4px 12px;font-size:.7rem;font-weight:800;margin-top:8px}
.empty-big{text-align:center;padding:50px 20px;color:var(--text-dim)}
.empty-big .empty-icon{font-size:2.6rem;margin-bottom:8px}
.empty-big p{font-size:.88rem;font-weight:700}

/* ===== MACHINES ===== */
.machine-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:12px;border-inline-start:4px solid var(--primary)}
.machine-card:nth-child(5n+2){border-inline-start-color:var(--purple)}
.machine-card:nth-child(5n+3){border-inline-start-color:var(--orange)}
.machine-card:nth-child(5n+4){border-inline-start-color:var(--teal)}
.machine-card:nth-child(5n){border-inline-start-color:var(--green)}
.machine-name{font-weight:900;font-size:1rem}
.machine-type{font-size:.7rem;font-weight:700;color:var(--text-dim);margin-bottom:8px}
.machine-last{font-size:.78rem;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.machine-last strong{color:var(--text)}
.counter-row{display:flex;gap:10px;align-items:end}
.counter-field{flex:1}
.counter-field label{font-size:.7rem}
.btn-save-counter{border:none;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-weight:800;font-size:.82rem;padding:10px 18px;height:40px}
.counter-history{margin-top:12px;border-top:1px dashed var(--border-light);padding-top:8px}
.counter-entry{display:flex;align-items:center;justify-content:space-between;font-size:.76rem;padding:4px 2px;font-weight:700}
.ce-date{color:var(--text-dim)}
.ce-val{font-weight:900}
.ce-diff{color:var(--green);font-weight:900;min-width:60px;text-align:end;direction:ltr}

/* ===== DASHBOARD ===== */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.dash-stat{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:14px;text-align:center}
.ds-icon{font-size:1.3rem}
.ds-label{font-size:.7rem;font-weight:800;color:var(--text-muted);margin:3px 0}
.ds-value{font-size:1.35rem;font-weight:900;color:var(--primary)}
.dash-section{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:14px}
.dash-section h3{font-size:.9rem;font-weight:900;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{min-width:110px;font-size:.76rem;font-weight:800;color:var(--text-2)}
.bar-track{flex:1;height:22px;background:var(--surface-3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;color:#fff;font-size:.66rem;font-weight:900;display:flex;align-items:center;justify-content:flex-end;padding:0 8px;min-width:30px;transition:width .4s}
.dash-empty{color:var(--text-dim);font-size:.82rem;text-align:center;padding:16px;font-weight:600}

/* ===== SETTINGS ===== */
.set-grid{display:grid;gap:14px}
.quick-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn-primary{border:none;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-weight:800;font-size:.86rem;padding:11px 20px;transition:background .15s;white-space:nowrap}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2);color:var(--text-2);font-weight:800;font-size:.82rem;padding:10px 16px;white-space:nowrap}
.btn-danger{border:none;border-radius:var(--radius-sm);background:var(--red-light);color:var(--red);font-weight:800;font-size:.82rem;padding:10px 16px;white-space:nowrap}
.pw-row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
.pw-row .field{flex:1;min-width:130px}
.mach-set-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.mach-set-row input{flex:1}
.conn-status-box{border-radius:var(--radius-sm);padding:10px 14px;font-size:.8rem;font-weight:800;margin-bottom:12px}
.conn-status-box.local{background:var(--amber-light);color:var(--amber)}
.conn-status-box.online{background:var(--green-light);color:var(--green)}
.help-note{font-size:.74rem;color:var(--text-dim);font-weight:600;margin-top:8px;line-height:1.6}

/* ===== MODAL / TOAST ===== */
.overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.visible{display:flex;animation:fadeUp .15s}
.modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);padding:24px;width:100%;max-width:360px;text-align:center}
.modal-icon{font-size:2rem;margin-bottom:8px}
.modal h3{font-size:1.02rem;font-weight:900;margin-bottom:4px}
.modal .modal-sub{font-size:.8rem;color:var(--text-muted);font-weight:600;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;justify-content:center;margin-top:16px}
.btn-modal{flex:1;padding:10px;border-radius:var(--radius-sm);font-weight:800;font-size:.88rem;border:none}
.btn-modal.primary{background:var(--primary);color:#fff}
.btn-modal.danger{background:var(--red);color:#fff}
.btn-modal.secondary{background:var(--surface-3);color:var(--text-2)}
.toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:99px;font-size:.84rem;font-weight:800;opacity:0;pointer-events:none;transition:all .25s;z-index:200;box-shadow:var(--shadow-lg);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red);color:#fff}
@media (max-width:560px){
  .form-row{flex-direction:column;gap:0}

  .conn-pill .conn-txt{display:none}
  .topbar-brand .brand-name{display:none}

}

/* Pure-JS SHA-256 (fallback when crypto.subtle is unavailable, e.g. file://) */
function sha256Sync(ascii) {
  function rightRotate(v, a){ return (v >>> a) | (v << (32 - a)); }
  let maxWord = Math.pow(2, 32), result = '';
  const words = [], asciiBitLength = ascii.length * 8;
  let hash = sha256Sync.h = sha256Sync.h || [], k = sha256Sync.k = sha256Sync.k || [];
  let primeCounter = k.length;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (let i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (Math.pow(candidate, .5) * maxWord) | 0;
      k[primeCounter++] = (Math.pow(candidate, 1 / 3) * maxWord) | 0;
    }
  }
  ascii += '\x80';
  while (ascii.length % 64 - 56) ascii += '\x00';
  for (let i = 0; i < ascii.length; i++) {
    const j = ascii.charCodeAt(i);
    if (j >> 8) return; // ASCII only path; non-ASCII handled by caller encoding
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words.length] = ((asciiBitLength / maxWord) | 0);
  words[words.length] = (asciiBitLength);
  for (let j = 0; j < words.length;) {
    const w = words.slice(j, j += 16), oldHash = hash;
    hash = hash.slice(0, 8);
    for (let i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7]
        + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
        + ((e & hash[5]) ^ ((~e) & hash[6])) + k[i]
        + (w[i] = (i < 16) ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0);
      const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1 + temp2) | 0].concat(hash);
      hash[4] = (hash[4] + temp1) | 0;
    }
    for (let i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (let i = 0; i < 8; i++) {
    for (let j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

async function hashPw(pw) {
  const data = 'pz::' + pw;
  try {
    if (crypto && crypto.subtle) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
  } catch (e) { /* fall through */ }
  // encode to ASCII-safe string first
  const ascii = unescape(encodeURIComponent(data));
  return sha256Sync(ascii);
}

let db = null;

function getFbConfig() {
  if (FIREBASE_CONFIG && FIREBASE_CONFIG.projectId) return FIREBASE_CONFIG;

    const c = JSON.parse(localStorage.getItem('pz_fbconfig') || 'null');

const LocalStore = {
  async init() {
    state.transactions = JSON.parse(localStorage.getItem('pz_tx') || '[]');
    let mc = JSON.parse(localStorage.getItem('pz_mc') || 'null');
    if (!mc) { mc = DEFAULT_MACHINES; localStorage.setItem('pz_mc', JSON.stringify(mc)); }
    state.machines = mc;
    let s = JSON.parse(localStorage.getItem('pz_settings') || 'null');
    if (!s) {
      s = { empHash: await hashPw(DEFAULT_EMP_PW), adminHash: await hashPw(DEFAULT_ADMIN_PW) };
      localStorage.setItem('pz_settings', JSON.stringify(s));
    }
    state.settings = s;
  },
  async addTx(tx) {
    tx.id = 'L' + Date.now() + Math.random().toString(36).slice(2, 6);
    state.transactions.unshift(tx);
    localStorage.setItem('pz_tx', JSON.stringify(state.transactions));
    refreshAfterData();
  },
  async delTx(id) {
    state.transactions = state.transactions.filter(t => t.id !== id);
    localStorage.setItem('pz_tx', JSON.stringify(state.transactions));
    refreshAfterData();
  },
  async saveMachines(machines) {
    state.machines = machines;
    localStorage.setItem('pz_mc', JSON.stringify(machines));
    refreshAfterData();
  },
  async saveSettings(s) {
    state.settings = s;
    localStorage.setItem('pz_settings', JSON.stringify(s));
  },
};

const FireStore = {
  async init() {
    const cfg = getFbConfig();
    firebase.initializeApp(cfg);
    db = firebase.firestore();
    try { await db.enablePersistence({ synchronizeTabs: true }); } catch (e) { /* multi-tab or unsupported — fine */ }
    await firebase.auth().signInAnonymously();
    state.online = true;

    // settings (seed defaults on first run)
    const sRef = db.collection('settings').doc('config');
    const sSnap = await sRef.get();
    if (!sSnap.exists) {
      const seed = { empHash: await hashPw(DEFAULT_EMP_PW), adminHash: await hashPw(DEFAULT_ADMIN_PW) };
      await sRef.set(seed);
      state.settings = seed;
    } else {
      state.settings = sSnap.data();
    }
    sRef.onSnapshot(snap => { if (snap.exists) state.settings = snap.data(); });

    // machines (seed defaults on first run)
    const mSnap = await db.collection('machines').get();
    if (mSnap.empty) {
      const batch = db.batch();
      DEFAULT_MACHINES.forEach(m => batch.set(db.collection('machines').doc(m.id), m));
      await batch.commit();
    }
    db.collection('machines').onSnapshot(snap => {
      state.machines = snap.docs.map(d => ({ ...d.data(), id: d.id })).sort((a, b) => (a.order || 0) - (b.order || 0));
      refreshAfterData();
    });

    // transactions — live, newest first
    db.collection('transactions').orderBy('createdAt', 'desc').limit(5000).onSnapshot(snap => {
      state.transactions = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      refreshAfterData();
    });
  },
  async addTx(tx) { await db.collection('transactions').add(tx); },
  async delTx(id) { await db.collection('transactions').doc(id).delete(); },
  async saveMachines(machines) {
    const batch = db.batch();
    const existing = new Set(state.machines.map(m => m.id));
    machines.forEach(m => {
      const id = m.id || ('m' + Date.now() + Math.random().toString(36).slice(2, 5));
      batch.set(db.collection('machines').doc(id), { name: m.name, order: m.order, records: m.records || [] });
      existing.delete(id);
    });
    existing.forEach(id => batch.delete(db.collection('machines').doc(id)));
    await batch.commit();
  },
  async saveSettings(s) { await db.collection('settings').doc('config').set(s); },
};

function itemMainLabel(it) {
  if (it.type === 'custom') return it.desc;
  if (it.type === 'simple') return it.desc ? (svcLabel(it.svc) + ' — ' + it.desc) : svcLabel(it.svc);
  return null;
}
function renderInvoice() {
  const body = $('invoiceBody');
  if (!state.invoice.length) {
    body.innerHTML = `<div class="inv-empty">${t('inv.empty')}</div>`;
  } else {
    body.innerHTML = state.invoice.map(it => {
      const colorCls = it.color === 'color' ? 'tag-color' : it.color === 'black' ? 'tag-black' : '';
      const hasEng = it.engLength && it.engLength > 0;
      let tags = '';
      if (it.type === 'paper') {
        tags += `<span class="tag tag-paper">${svcLabel(it.svc)}</span>`;
        tags += `<span class="tag tag-op">${valLabel(it.op)}</span>`;
        if (it.color !== '—') tags += `<span class="tag ${colorCls}">${valLabel(it.color)}</span>`;
        if (it.face !== '—') tags += `<span class="tag tag-face">${valLabel(it.face)}</span>`;
        if (it.finish !== '—' && it.finish !== 'normal') tags += `<span class="tag tag-finish">${valLabel(it.finish)}</span>`;
      } else {
        tags += `<span class="tag ${it.type === 'custom' ? 'tag-custom' : 'tag-op'}">${escapeHtml(itemMainLabel(it))}</span>`;
      }
      if (it.isFinal) tags += `<span class="tag tag-final">${t('inv.final')}</span>`;
      return `<div class="inv-item">
        <div class="inv-item-top">
          <div class="inv-item-info">${tags}</div>
          <span class="inv-item-qty">×${it.qty}</span>
          <span class="inv-item-total">${it.total.toFixed(2)}</span>
          <button class="btn-del-item" data-id="${it.id}">✕</button>
        </div>
        ${hasEng ? `<div class="inv-item-eng"><span>📐 ${it.engLength} ${t('eng.m')}</span>${it.engNote ? `<span style="color:var(--text-muted)">— ${escapeHtml(it.engNote)}</span>` : ''}</div>` : ''}
      </div>`;
    }).join('');
  }
  $('invTotal').textContent = fmtMoney(state.invoice.reduce((s, it) => s + it.total, 0));
  $('btnSaveTx').disabled = !state.invoice.length;
}
function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

$('invoiceBody').addEventListener('click', e => {
  const btn = e.target.closest('.btn-del-item'); if (!btn) return;
  state.invoice = state.invoice.filter(it => String(it.id) !== btn.dataset.id);
  renderInvoice();
});

  if (!state.invoice.length) return;
  const date = $('txDate').value;

$('historyFilters').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip'); if (!chip) return;
  document.querySelectorAll('#historyFilters .filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  state.historyFilter = chip.dataset.filter;
  renderHistory();
});
$('searchHistory').addEventListener('input', () => renderHistory());

function getFilteredHistory() {
  const search = $('searchHistory').value.trim().toLowerCase();
  const now = new Date();
  return state.transactions.filter(tx => {
    if (search && !(tx.client || '').toLowerCase().includes(search) && !(tx.date || '').includes(search)) return false;
    if (state.historyFilter === 'today') return tx.date === todayStr();
    if (state.historyFilter === 'week') return (now - new Date(tx.date + 'T00:00:00')) / 86400000 <= 7;
    if (state.historyFilter === 'month') { const d = new Date(tx.date + 'T00:00:00'); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); }
    return true;
  });
}

function canDeleteTx(tx) {
  if (state.role === 'admin') return true;
  const age = Date.now() - new Date(tx.createdAt || 0).getTime();
  return age < 10 * 60 * 1000;
}

function renderHistory() {
  if (!$('pageHistory')) return;
  const filtered = getFilteredHistory();
  const list = $('historyList');
  if (state.role === 'admin') {
    $('periodTotalVal').textContent = fmtMoney(filtered.reduce((s, t2) => s + (t2.total || 0), 0));
  }
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-big"><div class="empty-icon">📭</div><p>${state.transactions.length ? t('hist.noresults') : t('hist.empty')}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(tx => {
    const tagSet = [...new Set((tx.items || []).map(it => {
      if (it.type === 'custom') return `<span class="tag tag-custom">${escapeHtml(it.desc)}</span>`;
      if (it.svc === 'eng') return `<span class="tag tag-eng">${svcLabel('eng')}</span>`;
      if (it.type === 'paper') return `<span class="tag tag-paper">${svcLabel(it.svc)}</span>`;
      return `<span class="tag tag-op">${svcLabel(it.svc)}</span>`;
    }))].slice(0, 6).join('');
    const engTotal = (tx.items || []).filter(it => it.engLength > 0).reduce((s, it) => s + it.engLength, 0);
    const byBadge = tx.createdBy ? `<span class="by-badge">${t(tx.createdBy === 'admin' ? 'role.admin' : 'role.employee')}</span>` : '';
    const delBtn = canDeleteTx(tx) ? `<button class="btn-delete-transaction" data-id="${tx.id}">${t('hist.delete')}</button>` : '';
    return `<div class="history-card">
      <div class="history-card-head">
        <span class="client">${escapeHtml(tx.client)}${byBadge}</span>
        <span class="date">${fmtDate(tx.date)}</span>
      </div>
      ${tx.notes ? `<div class="notes">${escapeHtml(tx.notes)}</div>` : ''}
      <div class="history-card-tags">${tagSet}</div>
      ${engTotal > 0 ? `<div style="font-size:.72rem;color:var(--teal);margin-bottom:4px;font-weight:700">📐 ${engTotal.toFixed(2)} ${t('eng.m')}</div>` : ''}
      <div class="history-card-bottom">
        <span class="items-count">${tx.pieces} ${t('hist.pieces')} · ${(tx.items || []).length} ${t('hist.items')}</span>
        <span class="total">${fmtMoney(tx.total || 0)}</span>
      </div>
      ${delBtn}
    </div>`;
  }).join('');

  list.querySelectorAll('.btn-delete-transaction').forEach(btn => {
    btn.addEventListener('click', () => {
      const tx = state.transactions.find(t2 => String(t2.id) === btn.dataset.id);
      if (!tx) return;
      if (!canDeleteTx(tx)) { toast(t('hist.delDenied'), true); return; }
      askConfirm(t('confirm.delTx'), t('confirm.delTxSub'), async () => {
        await store.delTx(tx.id);
        toast(t('toast.deleted'));
        renderHistory();
      });
    });
  });
}

/* ==================== DASHBOARD (admin) ==================== */
function itemStatKey(it) {
  if (it.type === 'custom') return it.desc;
  if (it.type === 'simple') return svcLabel(it.svc);
  return valLabel(it.op);
}
function renderDashboard() {
  if (state.role !== 'admin') return;
  const txs = state.transactions;
  $('dTotalTx').textContent = txs.length.toLocaleString('en');
  $('dTotalRev').textContent = Math.round(txs.reduce((s, t2) => s + (t2.total || 0), 0)).toLocaleString('en');
  $('dTotalPieces').textContent = txs.reduce((s, t2) => s + (t2.pieces || 0), 0).toLocaleString('en');
  $('dTotalClients').textContent = new Set(txs.map(t2 => t2.client)).size.toLocaleString('en');
  const today = todayStr();
  $('dTodayRev').textContent = Math.round(txs.filter(t2 => t2.date === today).reduce((s, t2) => s + (t2.total || 0), 0)).toLocaleString('en');
  const now = new Date();
  $('dMonthRev').textContent = Math.round(txs.filter(t2 => { const d = new Date((t2.date || '') + 'T00:00:00'); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); }).reduce((s, t2) => s + (t2.total || 0), 0)).toLocaleString('en');
  $('dashEng').textContent = txs.reduce((s, t2) => s + (t2.engMeters || 0), 0).toFixed(2) + ' ' + t('eng.m');

  // top services
  const svcCount = {};
  txs.forEach(t2 => (t2.items || []).forEach(it => {
    const key = itemStatKey(it);
    if (!key) return;
    svcCount[key] = (svcCount[key] || 0) + (it.qty || 0);
  }));
  renderBars('dashServices', svcCount, ['var(--primary)']);

  // top papers
  const paperCount = {};
  txs.forEach(t2 => (t2.items || []).forEach(it => {
    if (it.type === 'paper') paperCount[svcLabel(it.svc)] = (paperCount[svcLabel(it.svc)] || 0) + (it.qty || 0);
  }));
  renderBars('dashPapers', paperCount, ['var(--primary)', '#0369a1', 'var(--teal)', 'var(--purple)', 'var(--green)']);

  // last 7 days revenue
  const days = {};
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    days[k] = 0;
  }
  txs.forEach(t2 => { if (t2.date in days) days[t2.date] += (t2.total || 0); });
  const dayEntries = Object.entries(days);
  const dayMax = Math.max(...dayEntries.map(e => e[1]), 1);
  $('dashLast7').innerHTML = dayEntries.map(([d, v]) => {
    const pct = Math.max((v / dayMax * 100), 2).toFixed(0);
    const label = new Date(d + 'T00:00:00').toLocaleDateString(lang === 'ar' ? 'ar-EG' : 'en-GB', { weekday: 'short', day: 'numeric' });
    return `<div class="bar-row"><span class="bar-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--teal)">${Math.round(v).toLocaleString('en')}</div></div></div>`;
  }).join('');
}
function renderBars(elId, counts, colors) {
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const max = sorted.length ? sorted[0][1] : 1;
  $(elId).innerHTML = sorted.map(([name, val], i) => {
    const pct = Math.max((val / max * 100), 4).toFixed(0);
    return `<div class="bar-row"><span class="bar-label">${escapeHtml(name)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i % colors.length]}">${val.toLocaleString('en')}</div></div></div>`;
  }).join('') || `<div class="dash-empty">${t('dash.nodata')}</div>`;
}

$('btnExportXlsx').addEventListener('click', () => {
  const from = $('expFrom').value;
  const to = $('expTo').value;
  const txs = state.transactions.filter(tx => (!from || tx.date >= from) && (!to || tx.date <= to))
    .slice().sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
  if (!txs.length) { toast(t('toast.expNone'), true); return; }

  const wb = XLSX.utils.book_new();
  if (lang === 'ar') wb.Workbook = { Views: [{ RTL: true }] };

  /* Sheet 1: transactions (one row per item) */
  const rows = [];
  txs.forEach((tx, ti) => {
    (tx.items || []).forEach(it => {
      rows.push({
        [t('xh.no')]: ti + 1,
        [t('xh.date')]: tx.date,
        [t('xh.client')]: tx.client,
        [t('xh.by')]: tx.createdBy ? t(tx.createdBy === 'admin' ? 'role.admin' : 'role.employee') : '',
        [t('xh.notes')]: tx.notes || '',
        [t('xh.svc')]: it.type === 'custom' ? (lang === 'ar' ? 'خدمة أخرى' : 'Custom') : svcLabel(it.svc),
        [t('xh.detail')]: it.type === 'paper' ? valLabel(it.op) : (it.desc || ''),
        [t('xh.color')]: it.color === '—' ? '' : valLabel(it.color),
        [t('xh.sides')]: it.face === '—' ? '' : valLabel(it.face),
        [t('xh.finish')]: it.finish === '—' ? '' : valLabel(it.finish),
        [t('xh.engLen')]: it.engLength || '',
        [t('xh.engNote')]: it.engNote || '',
        [t('xh.qty')]: it.qty,
        [t('xh.price')]: Number(it.price),
        [t('xh.final')]: it.isFinal ? t('yes') : t('no'),
        [t('xh.total')]: Number(it.total),
      });
    });
  });
  const grandTotal = txs.reduce((s, t2) => s + (t2.total || 0), 0);
  const grandPieces = txs.reduce((s, t2) => s + (t2.pieces || 0), 0);
  rows.push({});
  rows.push({ [t('xh.notes')]: t('xh.grand'), [t('xh.qty')]: grandPieces, [t('xh.total')]: Math.round(grandTotal * 100) / 100 });
  const ws1 = XLSX.utils.json_to_sheet(rows);
  ws1['!cols'] = [{ wch: 5 }, { wch: 11 }, { wch: 18 }, { wch: 10 }, { wch: 22 }, { wch: 14 }, { wch: 14 }, { wch: 9 }, { wch: 11 }, { wch: 9 }, { wch: 13 }, { wch: 16 }, { wch: 8 }, { wch: 10 }, { wch: 10 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws1, t('sheet.tx'));

  /* Sheet 2: summary */
  const svcAgg = {};
  txs.forEach(t2 => (t2.items || []).forEach(it => {
    const key = it.type === 'custom' ? (it.desc || '') : svcLabel(it.svc);
    if (!svcAgg[key]) svcAgg[key] = { qty: 0, rev: 0 };
    svcAgg[key].qty += (it.qty || 0);
    svcAgg[key].rev += (it.total || 0);
  }));
  const sumRows = [
    [t('sum.period'), (from || '…') + ' → ' + (to || '…')],
    [t('sum.generated'), new Date().toLocaleString(lang === 'ar' ? 'ar-EG' : 'en-GB')],
    [],
    [t('sum.rev'), Math.round(grandTotal * 100) / 100 + ' ' + t('cur')],
    [t('sum.tx'), txs.length],
    [t('sum.pieces'), grandPieces],
    [t('sum.clients'), new Set(txs.map(t2 => t2.client)).size],
    [t('sum.eng'), Math.round(txs.reduce((s, t2) => s + (t2.engMeters || 0), 0) * 100) / 100 + ' ' + t('eng.m')],
    [],
    [t('sum.bySvc')],
    [t('sum.svcCol'), t('sum.qtyCol'), t('sum.revCol')],
    ...Object.entries(svcAgg).sort((a, b) => b[1].rev - a[1].rev).map(([k, v]) => [k, v.qty, Math.round(v.rev * 100) / 100]),
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!cols'] = [{ wch: 28 }, { wch: 22 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, ws2, t('sheet.sum'));

  /* Sheet 3: machines */
  const machRows = [];
  state.machines.forEach(m => {
    (m.records || []).forEach((r, i, arr) => {
      if (from && r.date < from) return;
      if (to && r.date > to) return;
      machRows.push({
        [t('xh.machine')]: m.name,
        [t('xh.date')]: r.date,
        [t('xh.reading')]: r.value,
        [t('xh.diff')]: i > 0 ? r.value - arr[i - 1].value : '',
      });
    });
  });
  if (machRows.length) {
    const ws3 = XLSX.utils.json_to_sheet(machRows);
    ws3['!cols'] = [{ wch: 20 }, { wch: 11 }, { wch: 12 }, { wch: 10 }];
    XLSX.utils.book_append_sheet(wb, ws3, t('sheet.mach'));
  }

  XLSX.writeFile(wb, `PrintZone_${(from || 'all')}_${(to || todayStr())}.xlsx`);
  toast(t('toast.expDone'));
});

/* ==================== BOOT ==================== */
function classifyInitError(err) {
  const s = ((err && err.code) || '') + ' ' + ((err && err.message) || '');
  if (/operation-not-allowed|admin-restricted-operation|configuration-not-found|sign_in_provider|identitytoolkit/i.test(s)) return { key: 'err.auth', raw: err.code || '' };
  if (/permission-denied|insufficient permissions/i.test(s)) return { key: 'err.rules', raw: '' };
  if (/not-found|does not exist|NOT_FOUND/i.test(s)) return { key: 'err.notfound', raw: '' };
  return { key: 'err.generic', raw: (err && (err.code || err.message)) || '' };
}

(async function boot() {
  applyI18n();
  $('txDate').value = todayStr();
  try {
    if (getFbConfig()) {
      if (typeof firebase === 'undefined') throw { code: 'scripts', message: 'firebase scripts not loaded' };
      store = FireStore;
      await store.init();
    } else {
      store = LocalStore;
      await store.init();
    }
  } catch (err) {
    console.error('Firebase init failed, falling back to local:', err);
    state.initError = (err && err.code === 'scripts') ? { key: 'err.scripts', raw: '' } : classifyInitError(err);
    state.online = false;
    store = LocalStore;
    await store.init();
    toast((lang === 'ar' ? 'تعذر الاتصال — وضع محلي مؤقتاً' : 'Connection failed — local mode for now'), true);
  }
  applyI18n();
  // restore session
  if (sessionStorage.getItem('pz_session_admin') === '1') enterApp('admin');
  else if (localStorage.getItem('pz_session') === 'employee') enterApp('employee');
})();
</script>
</body>
</html>
